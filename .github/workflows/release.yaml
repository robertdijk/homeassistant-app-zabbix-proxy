name: Release

on:
  pull_request_target:
    types: [closed]
  workflow_dispatch:

jobs:
  tag:
    name: Create release tag
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event.pull_request.merged == true &&
       github.event.pull_request.user.login == 'dependabot[bot]')
    permissions:
      contents: write
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Check out the repository
        uses: actions/checkout@v7.0.0

      - name: Read version from config.yaml
        id: version
        run: |
          version=$(sed -nE 's/^version:[[:space:]]*"?([^"]+)"?[[:space:]]*$/\1/p' zabbix-proxy/config.yaml)
          if [[ -z "${version}" ]]; then
            echo "Could not read version from zabbix-proxy/config.yaml" >&2
            exit 1
          fi
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      - name: Create and push tag
        run: |
          if git ls-remote --exit-code origin "refs/tags/v${{ steps.version.outputs.version }}" &>/dev/null; then
            echo "Tag v${{ steps.version.outputs.version }} already exists" >&2
            exit 1
          fi
          git tag "v${{ steps.version.outputs.version }}"
          git push origin "v${{ steps.version.outputs.version }}"

  build:
    name: Build and publish
    needs: tag
    permissions:
      contents: read
      id-token: write
      packages: write
    uses: ./.github/workflows/build-app.yaml
    with:
      app: zabbix-proxy
      publish: true
    secrets: inherit

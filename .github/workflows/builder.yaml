name: Builder

env:
  MONITORED_FILES: "config.json config.yaml config.yml Dockerfile rootfs"

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate-release:
    name: Validate release metadata
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repository
        uses: actions/checkout@v6.0.2

      - name: Validate app version
        run: |
          version="$(sed -nE 's/^version:[[:space:]]*"?([^"]+)"?[[:space:]]*$/\1/p' zabbix-proxy/config.yaml)"
          image="$(sed -nE 's/^image:[[:space:]]*"?([^"]+)"?[[:space:]]*$/\1/p' zabbix-proxy/config.yaml)"

          if [[ -z "${version}" ]]; then
            echo "Could not read version from zabbix-proxy/config.yaml" >&2
            exit 1
          fi

          if [[ ! "${version}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "App version must use X.Y.Z format, got '${version}'" >&2
            exit 1
          fi

          if [[ "${image}" != "ghcr.io/robertdijk/homeassistant-app-zabbix-proxy" ]]; then
            echo "App image must be ghcr.io/robertdijk/homeassistant-app-zabbix-proxy, got '${image}'" >&2
            exit 1
          fi

          if ! grep -qE "^##[[:space:]]+${version}$" zabbix-proxy/CHANGELOG.md; then
            echo "zabbix-proxy/CHANGELOG.md must contain a '## ${version}' section" >&2
            exit 1
          fi

          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            tag_version="${GITHUB_REF_NAME#v}"
            if [[ "${tag_version}" != "${version}" ]]; then
              echo "Git tag ${GITHUB_REF_NAME} does not match app version ${version}" >&2
              exit 1
            fi
          fi

  init:
    name: Initialize builds
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.filter.outputs.changed }}
      changed_apps: ${{ steps.filter.outputs.changed_apps }}
    steps:
      - name: Check out the repository
        uses: actions/checkout@v6.0.2

      - name: Get changed files
        id: changed_files
        if: github.ref_type != 'tag' && github.event_name != 'workflow_dispatch'
        uses: tj-actions/changed-files@v47

      - name: Find app directories
        id: apps
        uses: home-assistant/actions/helpers/find-addons@master

      - name: Filter changed apps
        id: filter
        env:
          APPS: ${{ steps.apps.outputs.addons }}
          CHANGED_FILES: ${{ steps.changed_files.outputs.all_changed_files }}
        run: |
          changed_apps=()

          if [[ "${GITHUB_REF_TYPE}" == "tag" || "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            changed_apps=(${APPS})
          # If the workflow file itself changed, rebuild all apps
          elif [[ "${CHANGED_FILES}" =~ \.github/workflows/(builder|build-app)\.yaml ]]; then
            changed_apps=(${APPS})
          else
            for app in ${APPS}; do
              for file in ${MONITORED_FILES}; do
                if [[ "${CHANGED_FILES}" =~ ${app}/${file} ]]; then
                  changed_apps+=("${app}")
                  break
                fi
              done
            done
          fi

          if [[ ${#changed_apps[@]} -gt 0 ]]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "changed_apps=$(jq -nc '$ARGS.positional' --args "${changed_apps[@]}")" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

  build-app:
    name: Build ${{ matrix.app }}
    needs: [validate-release, init]
    if: needs.init.outputs.changed == 'true'
    permissions:
      contents: read
      id-token: write
      packages: write
    strategy:
      fail-fast: false
      matrix:
        app: ${{ fromJSON(needs.init.outputs.changed_apps) }}
    uses: ./.github/workflows/build-app.yaml
    with:
      app: ${{ matrix.app }}
      publish: ${{ github.ref_type == 'tag' }}
    secrets: inherit

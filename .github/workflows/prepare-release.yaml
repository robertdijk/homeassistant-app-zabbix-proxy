name: Prepare release

# Runs when Dependabot opens or updates a PR. Docker updates reset the app
# release counter for the new Zabbix version; other updates increment the
# current app release counter and use the PR summary as the changelog entry.

on:
  pull_request_target:
    types: [opened, synchronize]

permissions:
  contents: write

jobs:
  prepare:
    name: Bump version and changelog
    if: github.actor == 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Check out the PR branch
        uses: actions/checkout@v7.0.0
        with:
          ref: ${{ github.head_ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare release metadata
        id: app
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_HEAD_REF: ${{ github.head_ref }}
        run: |
          python3 - <<'EOF'
          import os
          import pathlib
          import re
          import sys

          config_path = pathlib.Path("zabbix-proxy/config.yaml")
          changelog_path = pathlib.Path("zabbix-proxy/CHANGELOG.md")
          dockerfile_path = pathlib.Path("zabbix-proxy/Dockerfile")

          config = config_path.read_text()
          changelog = changelog_path.read_text()
          dockerfile = dockerfile_path.read_text()

          version_match = re.search(
              r'^version:\s*"?([0-9]+\.[0-9]+\.[0-9]+)-([0-9]+)"?\s*$',
              config,
              re.MULTILINE,
          )
          if not version_match:
              print("Could not read app version from zabbix-proxy/config.yaml", file=sys.stderr)
              sys.exit(1)

          current_base = version_match.group(1)
          current_release = int(version_match.group(2))
          current_version = f"{current_base}-{current_release}"

          docker_match = re.search(
              r'^FROM zabbix/zabbix-proxy-sqlite3:alpine-([0-9]+\.[0-9]+\.[0-9]+)\s*$',
              dockerfile,
              re.MULTILINE,
          )
          if not docker_match:
              print("Could not read Zabbix version from zabbix-proxy/Dockerfile", file=sys.stderr)
              sys.exit(1)

          head_ref = os.environ["PR_HEAD_REF"]
          if head_ref.startswith("dependabot/docker/"):
              zabbix_version = docker_match.group(1)
              new_version = f"{zabbix_version}-1"
              summary = f"Update to Zabbix {zabbix_version}."
          else:
              body = os.environ.get("PR_BODY", "")
              title = os.environ.get("PR_TITLE", "")
              summary = next((line.strip() for line in body.splitlines() if line.strip()), title)
              summary = summary.rstrip(".") + "."

              top_section = re.search(
                  r'^##\s+[0-9]+\.[0-9]+\.[0-9]+-[0-9]+\s*\n(?P<body>.*?)(?=^##\s+|\Z)',
                  changelog,
                  re.MULTILINE | re.DOTALL,
              )
              if top_section and summary in top_section.group("body"):
                  new_version = current_version
              else:
                  new_version = f"{current_base}-{current_release + 1}"

          entry = f"## {new_version}\n\n- {summary}\n\n"

          config = re.sub(
              r'^version:\s*"?[^"\n]+"?\s*$',
              f'version: "{new_version}"',
              config,
              count=1,
              flags=re.MULTILINE,
          )

          if not re.search(rf'^##\s+{re.escape(new_version)}\s*$', changelog, re.MULTILINE):
              changelog = re.sub(r'(<!--[^\n]*-->\n)', r'\1\n' + entry, changelog, count=1)

          config_path.write_text(config)
          changelog_path.write_text(changelog)

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as output:
              output.write(f"version={new_version}\n")
          EOF

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add zabbix-proxy/config.yaml zabbix-proxy/CHANGELOG.md
          git diff --staged --quiet && echo "Nothing to commit" && exit 0
          git commit -m "Prepare release ${{ steps.app.outputs.version }}"
          git push
